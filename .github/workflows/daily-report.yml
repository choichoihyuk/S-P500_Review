name: Daily S&P 500 Report

# KST = UTC+9 (DST 없음) → KST 07:00 = UTC 22:00 (전날).
# GitHub Actions cron은 UTC 기준.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}  # 수동 트리거 (Actions 탭에서 "Run workflow")

permissions:
  contents: read

# 이전 실행이 지연돼 다음 실행과 겹치면 큐에 대기 (중복 실행 방지)
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  send-report:
    name: Fetch + send report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Secrets는 Repo Settings → Secrets and variables → Actions 에서 등록
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      LOG_LEVEL: INFO
      # tzdata 로드 시 필요할 수 있음 (ZoneInfo)
      TZ: UTC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report
        run: python -m src.main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
